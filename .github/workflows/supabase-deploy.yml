name: Supabase deploy

# Manual one-click deploy of the Supabase backend: applies migrations, sets Edge Function
# secrets, and deploys all Edge Functions via the Supabase CLI.
# Requires these repo Actions secrets:
#   SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, CRON_SECRET, FINNHUB_API_KEY,
#   VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT
on:
  workflow_dispatch:

env:
  PROJECT_REF: msudkicgsjpfqjfphdhh
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply migrations
        run: supabase db push

      - name: Set Edge Function secrets
        run: |
          supabase secrets set --project-ref "$PROJECT_REF" \
            CRON_SECRET="${{ secrets.CRON_SECRET }}" \
            FINNHUB_API_KEY="${{ secrets.FINNHUB_API_KEY }}" \
            VAPID_PUBLIC_KEY="${{ secrets.VAPID_PUBLIC_KEY }}" \
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
            VAPID_SUBJECT="${{ secrets.VAPID_SUBJECT }}"

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
