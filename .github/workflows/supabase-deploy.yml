name: Supabase deploy

# Manual one-click deploy of the Supabase backend: applies migrations, sets Edge Function
# secrets, and deploys all Edge Functions via the Supabase CLI.
# Requires these repo Actions secrets:
#   SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, CRON_SECRET, FINNHUB_API_KEY,
#   VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT
on:
  workflow_dispatch:

env:
  PROJECT_REF: msudkicgsjpfqjfphdhh
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  quality:
    # Deploy-gate: ook een handmatige deploy mag niet zonder groene tests en build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply migrations
        run: supabase db push

      - name: Set Edge Function secrets
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          # LLM providers (set whichever you use) + optional overrides
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # Bitvavo (for the upcoming crypto sync)
          BITVAVO_API_KEY: ${{ secrets.BITVAVO_API_KEY }}
          BITVAVO_API_SECRET: ${{ secrets.BITVAVO_API_SECRET }}
        run: |
          set -euo pipefail
          # Only set secrets that are actually provided, so empty GitHub secrets don't clobber Supabase.
          ARGS=()
          for k in CRON_SECRET FINNHUB_API_KEY VAPID_PUBLIC_KEY VAPID_PRIVATE_KEY VAPID_SUBJECT \
                   MASSIVE_API_KEY GROQ_API_KEY CEREBRAS_API_KEY GEMINI_API_KEY MISTRAL_API_KEY \
                   ANTHROPIC_API_KEY LLM_PROVIDER LLM_MODEL BITVAVO_API_KEY BITVAVO_API_SECRET; do
            v="${!k:-}"
            [ -n "$v" ] && ARGS+=("$k=$v")
          done
          if [ ${#ARGS[@]} -gt 0 ]; then
            supabase secrets set --project-ref "$PROJECT_REF" "${ARGS[@]}"
          else
            echo "no secrets to set"
          fi

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"

      - name: Set up cron jobs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE="https://$PROJECT_REF.supabase.co/functions/v1"
          # Fetch the service_role key (a valid JWT the Edge Function gateway accepts).
          SR=$(curl -fsS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/api-keys?reveal=true" \
            | jq -r '.[] | select(.name=="service_role") | .api_key')
          test -n "$SR" || { echo "could not read service_role key"; exit 1; }

          # pg_cron jobs. Dollar-quoted ($job$) so the inner SQL needs no escaping; the invsys-* jobs
          # are unscheduled first so re-running the workflow is idempotent.
          SQL=$(cat <<SQL
          create extension if not exists pg_cron;
          create extension if not exists pg_net;
          do \$do\$ declare j record; begin
            for j in select jobname from cron.job where jobname like 'invsys-%' loop
              perform cron.unschedule(j.jobname);
            end loop;
          end \$do\$;
          select cron.schedule('invsys-universe-enrich','0 2 * * *', \$job\$
            select net.http_post(url:='$BASE/refresh-universe',
              headers:=jsonb_build_object('Content-Type','application/json','Authorization','Bearer $SR'),
              body:=jsonb_build_object('step','enrich','batch',15)); \$job\$);
          select cron.schedule('invsys-prices','0 6 * * 1-5', \$job\$
            select net.http_post(url:='$BASE/refresh-prices',
              headers:=jsonb_build_object('Content-Type','application/json','Authorization','Bearer $SR'),
              body:=jsonb_build_object('tickers', array['ASML.AS','RHM.DE','ESTC','ATO.PA'])); \$job\$);
          select cron.schedule('invsys-fundamentals','10 6 * * *', \$job\$
            select net.http_post(url:='$BASE/refresh-fundamentals',
              headers:=jsonb_build_object('Content-Type','application/json','Authorization','Bearer $SR'),
              body:=jsonb_build_object('secret','$CRON_SECRET','all',true)); \$job\$);
          select cron.schedule('invsys-autoscore','30 6 * * *', \$job\$
            select net.http_post(url:='$BASE/auto-score',
              headers:=jsonb_build_object('Content-Type','application/json','Authorization','Bearer $SR'),
              body:=jsonb_build_object('secret','$CRON_SECRET')); \$job\$);
          select cron.schedule('invsys-alerts','45 6 * * 1-5', \$job\$
            select net.http_post(url:='$BASE/send-alerts',
              headers:=jsonb_build_object('Content-Type','application/json','Authorization','Bearer $SR'),
              body:=jsonb_build_object('secret','$CRON_SECRET')); \$job\$);
          select cron.schedule('invsys-buytargets','0 5 * * 1', \$job\$
            select net.http_post(url:='$BASE/recompute-buy-targets',
              headers:=jsonb_build_object('Content-Type','application/json','Authorization','Bearer $SR'),
              body:=jsonb_build_object('secret','$CRON_SECRET')); \$job\$);
          SQL
          )
          CODE=$(curl -sS -o /tmp/cron_resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --data "$(jq -n --arg q "$SQL" '{query:$q}')")
          echo "HTTP $CODE"; cat /tmp/cron_resp.json
          case "$CODE" in 2*) echo "cron jobs scheduled";; *) echo "cron setup failed"; exit 1;; esac
